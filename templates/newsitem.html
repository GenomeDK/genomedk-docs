{% extends "layout.html" %}

{% block content %}
<div class="bg-white">
    <div class="container w-narrow">
        {% set parent = get_section(path=page.ancestors | reverse | first) %}
        <div><a href="{{ get_url(path=parent.path) }}">&lsaquo; Go back</a></div>

        <article>
            <div class="metadata">
                <time datetime="{{ page.date }}">{{ page.date | date(format='%B %-d, %Y') }}</time>
                - Aarhus, Denmark
            </div>
            <h1 class="title">{{ page.title }}</h1>
            {% if page.extra.illustration %}
                <img class="news-illustration" src="{{ page.path }}/{{ page.extra.illustration }}" />
            {% endif %}
            <div class="prose">
            {{ page.content | safe }}
            </div>
        </article>
    </div>
</div>
{% endblock %}
